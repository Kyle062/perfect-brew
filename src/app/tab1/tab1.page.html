<ion-content>
  <div class="home-wrapper">
    <div class="header-section">
      <p class="location-label">LOCATION:</p>
      <p class="address-text">Compostela, Davao de Oro, Philippines</p>
    </div>

    <div class="search-container">
      <ion-searchbar
        placeholder="Search Coffee"
        class="custom-searchbar"
      ></ion-searchbar>
      <div class="filter-btn-wrapper">
        <ion-button fill="clear" class="filter-btn" (click)="openFilter()">
          <ion-icon name="swap-vertical-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </div>
    </div>

    <ion-card class="promo-card">
      <img src="assets/promocoffee.png" alt="Promo Coffee" />
      <div class="promo-overlay">
        <div class="promo-badge">PROMO</div>
        <h2 class="promo-title">BUY ONE<br />AND GET<br />ONE FREE</h2>
      </div>
    </ion-card>

    <div class="section-heading">
      <h3>CHOOSE, BUY AND ENJOY</h3>
    </div>

    <!-- Current Category Card -->
    <ion-card
      class="category-card"
      (click)="navigateToProduct(currentCategory.id)"
    >
      <img
        [src]="currentCategory.image"
        [alt]="currentCategory.title + ' Coffee'"
      />
      <div class="category-overlay">
        <h2 class="category-title">{{ currentCategory.title }}</h2>
        <p class="category-subtext">"{{ currentCategory.subtext }}"</p>
        <button
          class="order-now-btn"
          (click)="$event.stopPropagation(); navigateToProduct(currentCategory.id)"
        >
          Order Now
        </button>
      </div>
    </ion-card>

    <!-- Navigation Controls -->
    <div class="navigation-controls">
      <ion-button
        fill="clear"
        class="nav-btn"
        (click)="previousCard()"
        [disabled]="currentIndex === 0"
      >
        <ion-icon name="chevron-back-outline"></ion-icon>
        <span>Prev</span>
      </ion-button>

      <div class="page-indicator">
        <span
          *ngFor="let cat of categories; let i = index"
          [class.active]="i === currentIndex"
          (click)="goToCard(i)"
        >
        </span>
      </div>

      <ion-button
        fill="clear"
        class="nav-btn"
        (click)="nextCard()"
        [disabled]="currentIndex === categories.length - 1"
      >
        <span>Next</span>
        <ion-icon name="chevron-forward-outline"></ion-icon>
      </ion-button>
    </div>
  </div>
</ion-content>
