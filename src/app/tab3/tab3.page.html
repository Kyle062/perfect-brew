<ion-content [fullscreen]="true">
  <div class="profile-container">
    <div class="header-section">
      <div class="avatar-wrapper">
        <img
          src="https://ui-avatars.com/api/?name=Visitor&background=7F6380&color=fff"
          alt="User"
        />
      </div>
      <h2 class="username">VISITORS</h2>
      <p class="role">GUEST ACCOUNT</p>
    </div>

    <div class="menu-section">
      <ion-list lines="none">
        <ion-item button detail="false">
          <ion-icon name="settings-outline" slot="start"></ion-icon>
          <ion-label>Settings</ion-label>
          <ion-icon
            name="chevron-forward-outline"
            slot="end"
            class="chevron"
          ></ion-icon>
        </ion-item>

        <ion-item button detail="false" (click)="goToInvite()">
          <ion-icon name="person-add-outline" slot="start"></ion-icon>
          <ion-label>Invite People</ion-label>
          <ion-icon
            name="chevron-forward-outline"
            slot="end"
            class="chevron"
          ></ion-icon>
        </ion-item>

        <ion-item button detail="false">
          <ion-icon name="log-out-outline" slot="start"></ion-icon>
          <ion-label>Leave</ion-label>
          <ion-icon
            name="chevron-forward-outline"
            slot="end"
            class="chevron"
          ></ion-icon>
        </ion-item>
      </ion-list>
    </div>

    <div class="footer-section">
      <ion-button fill="clear" color="dark" class="leave-btn">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        Leave
      </ion-button>
    </div>
  </div>
</ion-content>
