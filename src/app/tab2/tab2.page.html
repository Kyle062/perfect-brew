<ion-content [fullscreen]="true">
  <div class="header">
    <h1>All Products</h1>
 
  </div>

  <div class="product-grid">
    <div class="grid-card" *ngFor="let prod of paginatedProducts">
      <div class="image-container">
        <img [src]="prod.img" [alt]="prod.itemName" />
        <span class="price-badge">{{ prod.itemPrice }}</span>
      </div>
      <div class="info-block">
        <span class="category-tag">{{ prod.categoryTitle }}</span>
        <h3 class="product-name">{{ prod.itemName }}</h3>
        <button
          class="add-btn"
          [class.is-added]="prod.added"
          (click)="addToCart(prod)"
        >
          {{ prod.added ? 'ADDED TO CART' : 'ADD TO CART' }}
        </button>
      </div>
    </div>
  </div>

  <div class="pagination">
    <ion-button
      fill="clear"
      (click)="prevPage()"
      [disabled]="currentPage === 0"
    >
      <ion-icon name="chevron-back-outline"></ion-icon> PREV
    </ion-button>

    <span class="page-num">PAGE 0{{ currentPage + 1 }}</span>

    <ion-button
      fill="clear"
      (click)="nextPage()"
      [disabled]="(currentPage + 1) * itemsPerPage >= allProducts.length"
    >
      NEXT <ion-icon name="chevron-forward-outline"></ion-icon>
    </ion-button>
  </div>
</ion-content>
